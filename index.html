<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 주식 포트폴리오 (KRX 공식 Open API)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f6; color: #333; padding: 15px; margin: 0; transition: 0.3s; }
        .container { max-width: 1000px; margin: 0 auto; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { color: #2c3e50; margin: 0; font-size: 24px; }
        .btn-theme-toggle { background: #2c3e50; color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 14px; font-weight: bold; transition: 0.3s; }
        .btn-theme-toggle:hover { background: #1a252f; }

        .tab-menu { display: flex; border-bottom: 2px solid #ccc; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; cursor: pointer; background: #e9ecef; border: none; font-size: 15px; font-weight: bold; color: #7f8c8d; transition: 0.3s; border-radius: 8px 8px 0 0; margin-right: 5px; }
        .tab-btn.active { background: #3498db; color: white; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .card { background: #fff; padding: 20px; border-radius: 0 0 8px 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { color: #2c3e50; margin-top: 0; font-size: 20px; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input, select { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        input[readonly] { background-color: #e9ecef; }
        
        .search-area { display: flex; gap: 5px; margin-bottom: 10px; }
        .btn-search { background-color: #2ecc71; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; white-space: nowrap; }
        .btn-search:hover { background-color: #27ae60; }
        
        .btn-main { background-color: #3498db; color: white; border: none; padding: 12px 15px; border-radius: 4px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold; }
        .btn-main:hover { background-color: #2980b9; }

        .action-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .btn-refresh { background-color: #9b59b6; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: bold; transition: background-color 0.3s; }
        .btn-refresh:hover { background-color: #8e44ad; }
        
        .dashboard { display: flex; gap: 15px; margin-bottom: 20px; }
        .dash-box { flex: 1; background: #ecf0f1; padding: 15px; border-radius: 8px; text-align: center; }
        .dash-box h3 { margin-top: 0; font-size: 13px; color: #7f8c8d; }
        .dash-box p { font-size: 18px; font-weight: bold; margin: 0; }
        
        .settings-bar { background-color: #e8f4f8; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; border: 1px solid #bce8f1; }
        .settings-bar input { flex: 1; }
        
        .target-setting { background-color: #fff3cd; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
        
        .positive { color: #e74c3c; }
        .negative { color: #2980b9; }

        .chart-container { width: 100%; max-width: 400px; margin: 0 auto 30px; }

        .table-responsive { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; min-width: 800px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: right; white-space: nowrap; }
        th { background-color: #f8f9fa; text-align: center; cursor: pointer; }
        td:first-child { text-align: center; }
        .highlight-row { background-color: #fff3cd !important; font-weight: bold; }
        .badge { background-color: #e74c3c; color: white; padding: 2px 6px; border-radius: 4px; font-size: 12px; margin-left: 5px; }

        .btn-small { padding: 6px 10px; border: none; border-radius: 3px; cursor: pointer; margin: 0 2px; color: white; font-size: 12px; }
        .btn-edit { background-color: #f39c12; }
        .btn-delete { background-color: #e74c3c; }

        /* 다크 모드 스타일 */
        body.dark-mode { background-color: #121212; color: #e0e0e0; }
        body.dark-mode h1, body.dark-mode h2, body.dark-mode label { color: #e0e0e0; }
        body.dark-mode .card { background-color: #1e1e1e; box-shadow: 0 4px 6px rgba(0,0,0,0.5); }
        body.dark-mode .tab-btn { background: #2d2d2d; color: #aaa; border-bottom-color: #444; }
        body.dark-mode .tab-btn.active { background: #bb86fc; color: #121212; }
        body.dark-mode .btn-main { background-color: #bb86fc; color: #121212; }
        body.dark-mode input, body.dark-mode select { background-color: #2d2d2d; color: #e0e0e0; border-color: #444; }
        body.dark-mode input[readonly] { background-color: #1e1e1e; }
        body.dark-mode .dash-box, body.dark-mode .target-setting { background-color: #2d2d2d; }
        body.dark-mode th, body.dark-mode td { border-color: #444; }
        body.dark-mode th { background-color: #2d2d2d; color: #e0e0e0; }
        body.dark-mode .positive { color: #ff6b6b; } 
        body.dark-mode .negative { color: #4dabf7; } 
        body.dark-mode .highlight-row { background-color: #3a3a1c !important; color: #fff; }
        body.dark-mode .btn-theme-toggle { background: #f1c40f; color: #333; }
        body.dark-mode .btn-search { background-color: #2ecc71; color: #121212; }
        body.dark-mode .btn-refresh { background-color: #bb86fc; color: #121212; }
        body.dark-mode .settings-bar { background-color: #1e2a38; border-color: #2c3e50; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-top">
        <h1>📈 나의 주식 포트폴리오 (KRX 공식 API)</h1>
        <button id="themeToggleBtn" class="btn-theme-toggle" onclick="toggleTheme()">🌙 다크 모드</button>
    </div>

    <div class="settings-bar">
        <label for="krxApiKey" style="color: #2980b9; font-weight: bold;">🔑 KRX 공식 Open API 인증키 (AUTH_KEY) 설정</label>
        <div style="display: flex; gap: 5px;">
            <input type="password" id="krxApiKey" placeholder="openapi.krx.co.kr에서 발급받은 AUTH_KEY를 입력하세요">
            <button class="btn-search" onclick="saveApiKey()">키 저장</button>
        </div>
        <span style="font-size: 12px; color: #7f8c8d;">※ 이 키는 HTTP Header에 실려 전송되며, 새로고침 시 로컬스토리지에 안전하게 유지됩니다.</span>
    </div>

    <div class="tab-menu">
        <button class="tab-btn active" id="btn-input" onclick="switchTab('tab-input', 'btn-input')">✍️ 투자 내역 입력</button>
        <button class="tab-btn" id="btn-view" onclick="switchTab('tab-view', 'btn-view')">📊 투자 내역 조회</button>
    </div>

    <div id="tab-input" class="tab-content active">
        <div class="card">
            <h2>종목 정보 입력</h2>
            <div class="form-group">
                <label for="searchInput">종목명 검색 (예: 삼성전자)</label>
                <div class="search-area">
                    <input type="text" id="searchInput" placeholder="정확한 종목명을 입력하세요">
                    <button class="btn-search" onclick="searchKrxAPI()" id="searchBtn">검색</button>
                </div>
                <select id="stockSelect">
                    <option value="">검색 후 정확한 종목을 선택하세요</option>
                </select>
            </div>

            <div class="form-group">
                <label for="purchaseDate">매입일자</label>
                <input type="date" id="purchaseDate">
            </div>
            <div class="form-group">
                <label for="shares">매입 주식수 (주)</label>
                <input type="number" id="shares" placeholder="예: 10" min="1">
            </div>
            <div class="form-group">
                <label for="purchasePrice">매입단가 (원)</label>
                <input type="number" id="purchasePrice" placeholder="예: 75000" min="0">
            </div>
            <div class="form-group">
                <label for="investAmount">총 투자금액 (원)</label>
                <input type="text" id="investAmount" readonly placeholder="수량과 단가를 입력하면 계산됩니다">
            </div>
            <button class="btn-main" onclick="addInvestment()" id="saveBtn">투자 내역 저장하기</button>
        </div>
    </div>

    <div id="tab-view" class="tab-content">
        <div class="card">
            <div class="action-bar">
                <h2>나의 포트폴리오 현황</h2>
                <button class="btn-refresh" id="refreshBtn" onclick="refreshAllPrices()">🔄 최신 종가 모두 새로고침</button>
            </div>
            
            <div class="dashboard">
                <div class="dash-box">
                    <h3>총 투자금액</h3>
                    <p id="totalInvest">0</p>
                </div>
                <div class="dash-box">
                    <h3>총 평가금액</h3>
                    <p id="totalValue">0</p>
                </div>
                <div class="dash-box">
                    <h3>총 수익금액</h3>
                    <p id="totalProfit">0</p>
                </div>
                <div class="dash-box">
                    <h3>총 수익률</h3>
                    <p id="totalReturn">0.00%</p>
                </div>
            </div>

            <div class="target-setting">
                <label for="targetRateInput" style="color:#d35400;">🎯 알림을 받을 목표 수익률을 설정하세요 (%):</label>
                <input type="number" id="targetRateInput" placeholder="예: 10" oninput="saveTargetRate()" value="10">
            </div>

            <div class="chart-container">
                <canvas id="portfolioChart"></canvas>
            </div>

            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th onclick="sortTable('name')">종목명 (코드) ↕️</th>
                            <th onclick="sortTable('date')">매입일자 ↕️</th>
                            <th onclick="sortTable('shares')">주식수 ↕️</th>
                            <th onclick="sortTable('purchasePrice')">매입단가 ↕️</th>
                            <th onclick="sortTable('currentPrice')">최신종가 ↕️</th>
                            <th onclick="sortTable('investAmount')">투자금액 ↕️</th>
                            <th onclick="sortTable('profit')">수익금액 ↕️</th>
                            <th onclick="sortTable('returnRate')">수익률 ↕️</th>
                            <th>관리</th>
                        </tr>
                    </thead>
                    <tbody id="portfolioTableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    let portfolio = JSON.parse(localStorage.getItem('myStockPortfolio')) || [];
    let targetRate = localStorage.getItem('myTargetRate') || 10;
    
    // API 키 초기화 (openapi.krx.co.kr 전용)
    let krxApiKey = localStorage.getItem('myKrxAuthKey') || '';
    document.getElementById('krxApiKey').value = krxApiKey;
    document.getElementById('targetRateInput').value = targetRate;
    let portfolioChart = null; 

    // 다크 모드
    const themeToggleBtn = document.getElementById('themeToggleBtn');
    if (localStorage.getItem('myAppTheme') === 'dark') {
        document.body.classList.add('dark-mode');
        themeToggleBtn.innerText = '☀️ 라이트 모드';
    }
    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        if (document.body.classList.contains('dark-mode')) {
            localStorage.setItem('myAppTheme', 'dark');
            themeToggleBtn.innerText = '☀️ 라이트 모드';
        } else {
            localStorage.setItem('myAppTheme', 'light');
            themeToggleBtn.innerText = '🌙 다크 모드';
        }
        drawChart(); 
    }

    function switchTab(tabId, btnId) {
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        document.getElementById(btnId).classList.add('active');
    }

    const sharesInput = document.getElementById('shares');
    const priceInput = document.getElementById('purchasePrice');
    const investAmountInput = document.getElementById('investAmount');

    function calculateFormTotal() {
        const shares = Number(sharesInput.value);
        const price = Number(priceInput.value);
        if (shares > 0 && price > 0) investAmountInput.value = (shares * price).toLocaleString();
        else investAmountInput.value = '';
    }
    sharesInput.addEventListener('input', calculateFormTotal);
    priceInput.addEventListener('input', calculateFormTotal);

    function saveToLocalStorage() { localStorage.setItem('myStockPortfolio', JSON.stringify(portfolio)); }
    function saveTargetRate() { targetRate = Number(document.getElementById('targetRateInput').value); localStorage.setItem('myTargetRate', targetRate); updateUI(); }
    
    function saveApiKey() {
        krxApiKey = document.getElementById('krxApiKey').value.trim();
        if(!krxApiKey) { alert("API 키(AUTH_KEY)를 입력해주세요."); return; }
        localStorage.setItem('myKrxAuthKey', krxApiKey);
        alert("KRX API 키가 안전하게 로컬에 저장되었습니다.");
    }

    // =========================================
    // [업데이트] KRX 공식 Open API (Header 통신) 적용
    // =========================================
   async function searchKrxAPI() {
        if (!krxApiKey) return alert('상단에서 KRX 공식 오픈 API 키(AUTH_KEY)를 먼저 설정해주세요.');
        
        const query = document.getElementById('searchInput').value.trim();
        if (!query) return alert('검색할 종목명을 입력해주세요.');

        const searchBtn = document.getElementById('searchBtn');
        searchBtn.innerText = '검색 중...';
        searchBtn.disabled = true;

        try {
            // [핵심 변경] 프록시(corsproxy)를 거치지 않고 직접 KRX 서버로 요청합니다!
            // 단, 크롬 'Allow CORS' 확장 프로그램이 반드시 켜져 있어야 합니다.
            const krxTargetUrl = `https://openapi.krx.co.kr/openapi/v1/domestic/stock/mktcap?itmsNm=${encodeURIComponent(query)}`;
            
            const response = await fetch(krxTargetUrl, {
                method: 'GET',
                headers: {
                    'AUTH_KEY': krxApiKey,
                    'Accept': 'application/json'
                }
            });
            
            if (!response.ok) {
                throw new Error(`서버 응답 오류 (상태 코드: ${response.status})`);
            }

            const data = await response.json();
            console.log("🔍 검색된 데이터 확인:", data); // F12 콘솔에서 데이터 내용 확인용

            const selectEl = document.getElementById('stockSelect');
            selectEl.innerHTML = '<option value="">종목을 선택하세요</option>';

            const items = data.OutBlock_1 || data.output || data;

            if (items && items.length > 0) {
                items.forEach(stock => {
                    const stockName = stock.ISU_NM || stock.ITMS_NM || '알수없음';
                    const stockCode = stock.ISU_SRT_CD || stock.SRTN_CD || '000000';
                    const currentPrice = stock.TDD_CLSPRC || stock.CLSPRC || 0;

                    const option = document.createElement('option');
                    option.value = JSON.stringify({ symbol: stockCode, price: currentPrice }); 
                    option.textContent = `${stockName} (${stockCode}) - 최신종가: ${Number(currentPrice).toLocaleString()}원`;
                    selectEl.appendChild(option);
                });
            } else {
                // KRX API는 이름이 정확히 일치해야만 결과를 줍니다.
                selectEl.innerHTML = '<option value="">검색 결과 없음 (띄어쓰기 포함 정확한 풀네임을 입력하세요)</option>';
            }
        } catch (error) {
            console.error("KRX Official API Error:", error);
            alert('검색 중 오류가 발생했습니다. 크롬 우측 상단의 [Allow CORS] 확장 프로그램이 켜져(컬러풀하게) 있는지 꼭 확인해주세요!');
        } finally {
            searchBtn.innerText = '검색';
            searchBtn.disabled = false;
        }
    }
    function addInvestment() {
        const selectedValue = document.getElementById('stockSelect').value;
        const stockNameText = document.getElementById('stockSelect').options[document.getElementById('stockSelect').selectedIndex].text;
        const purchaseDate = document.getElementById('purchaseDate').value;
        const shares = Number(sharesInput.value);
        const purchasePrice = Number(priceInput.value);

        if (!selectedValue || !purchaseDate || shares <= 0 || purchasePrice <= 0) {
            alert('모든 항목을 올바르게 선택 및 입력해주세요.');
            return;
        }

        const stockData = JSON.parse(selectedValue);
        const symbol = stockData.symbol;
        const currentPrice = Number(stockData.price);
        
        const cleanName = stockNameText.split(' (')[0];

        portfolio.push({
            name: cleanName, 
            symbol: symbol,
            date: purchaseDate, 
            shares: shares, 
            purchasePrice: purchasePrice, 
            currentPrice: currentPrice 
        });
        
        saveToLocalStorage(); 
        updateUI();

        document.getElementById('searchInput').value = '';
        document.getElementById('stockSelect').innerHTML = '<option value="">검색 후 정확한 종목을 선택하세요</option>';
        document.getElementById('purchaseDate').value = '';
        sharesInput.value = '';
        priceInput.value = '';
        investAmountInput.value = '';
        switchTab('tab-view', 'btn-view');
    }

    // =========================================
    // [업데이트] KRX 공식 API를 이용한 일괄 새로고침
    // =========================================
async function refreshAllPrices() {
        if (!krxApiKey) return alert('API 키(AUTH_KEY)가 설정되어 있지 않습니다.');
        if (portfolio.length === 0) return alert('포트폴리오에 등록된 주식이 없습니다.');

        const refreshBtn = document.getElementById('refreshBtn');
        const originalText = refreshBtn.innerText;
        refreshBtn.innerText = '🔄 주가 업데이트 중...';
        refreshBtn.disabled = true;

        try {
            const fetchedPrices = {};

            for (let i = 0; i < portfolio.length; i++) {
                const item = portfolio[i];

                if (!fetchedPrices[item.symbol]) {
                    // [핵심 변경] 여기도 프록시를 완전히 제거했습니다.
                    const krxTargetUrl = `https://openapi.krx.co.kr/openapi/v1/domestic/stock/mktcap?isuCd=${item.symbol}`;
                    
                    const response = await fetch(krxTargetUrl, {
                        method: 'GET',
                        headers: {
                            'AUTH_KEY': krxApiKey,
                            'Accept': 'application/json'
                        }
                    });

                    if (response.ok) {
                        const data = await response.json();
                        const fetchedItems = data.OutBlock_1 || data.output || data;
                        if (fetchedItems && fetchedItems.length > 0) {
                            fetchedPrices[item.symbol] = Number(fetchedItems[0].TDD_CLSPRC || fetchedItems[0].CLSPRC); 
                        }
                    }
                }

                if(fetchedPrices[item.symbol]) {
                    portfolio[i].currentPrice = fetchedPrices[item.symbol];
                }
            }

            saveToLocalStorage();
            updateUI();
            alert('모든 주가가 KRX 공식 데이터로 업데이트 되었습니다! 🎉');

        } catch (error) {
            console.error("Refresh Error:", error);
            alert('업데이트 중 오류가 발생했습니다. 확장 프로그램 활성화 상태를 확인해주세요.');
        } finally {
            refreshBtn.innerText = originalText;
            refreshBtn.disabled = false;
        }
    }

    function deleteInvestment(index) {
        if(confirm('정말 삭제하시겠습니까?')) { portfolio.splice(index, 1); saveToLocalStorage(); updateUI(); }
    }

    function editInvestment(index) {
        alert("수정 시 검색을 다시 진행하여 종목을 세팅해야 합니다.");
        const item = portfolio[index];
        document.getElementById('searchInput').value = item.name;
        document.getElementById('purchaseDate').value = item.date;
        sharesInput.value = item.shares;
        priceInput.value = item.purchasePrice;
        calculateFormTotal();

        portfolio.splice(index, 1);
        saveToLocalStorage();
        updateUI();
        switchTab('tab-input', 'btn-input');
    }

    function drawChart() {
        const ctx = document.getElementById('portfolioChart').getContext('2d');
        const aggregatedData = {};
        portfolio.forEach(item => {
            const investAmount = item.shares * item.purchasePrice;
            if(aggregatedData[item.name]) aggregatedData[item.name] += investAmount;
            else aggregatedData[item.name] = investAmount;
        });

        const isDark = document.body.classList.contains('dark-mode');
        const chartTextColor = isDark ? '#e0e0e0' : '#333';

        if (portfolioChart) portfolioChart.destroy();
        portfolioChart = new Chart(ctx, {
            type: 'pie',
            data: { labels: Object.keys(aggregatedData), datasets: [{ data: Object.values(aggregatedData), backgroundColor: ['#3498db', '#e74c3c', '#f1c40f', '#2ecc71', '#9b59b6', '#34495e'], borderColor: isDark ? '#1e1e1e' : '#fff' }] },
            options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { color: chartTextColor } }, title: { display: true, text: '투자 원금 비중', color: chartTextColor } } }
        });
    }

    let currentSortColumn = '';
    let isAscending = true; 

    function sortTable(column) {
        if (currentSortColumn === column) isAscending = !isAscending;
        else { currentSortColumn = column; isAscending = true; }

        portfolio.sort((a, b) => {
            let valA, valB;
            const investA = a.shares * a.purchasePrice;
            const profitA = (a.shares * a.currentPrice) - investA;
            const returnA = investA > 0 ? (profitA / investA) * 100 : 0;
            const investB = b.shares * b.purchasePrice;
            const profitB = (b.shares * b.currentPrice) - investB;
            const returnB = investB > 0 ? (profitB / investB) * 100 : 0;

            if (column === 'name') { valA = a.name; valB = b.name; }
            else if (column === 'date') { valA = a.date; valB = b.date; }
            else if (column === 'investAmount') { valA = investA; valB = investB; }
            else if (column === 'profit') { valA = profitA; valB = profitB; }
            else if (column === 'returnRate') { valA = returnA; valB = returnB; }
            else { valA = a[column]; valB = b[column]; } 

            if (valA < valB) return isAscending ? -1 : 1;
            if (valA > valB) return isAscending ? 1 : -1;
            return 0;
        });
        updateUI(); 
    }

    function updateUI() {
        const tableBody = document.getElementById('portfolioTableBody');
        tableBody.innerHTML = ''; 

        let sumInvest = 0; 
        let sumValue = 0;  

        portfolio.forEach((item, index) => {
            const investAmount = item.shares * item.purchasePrice; 
            const currentValue = item.shares * item.currentPrice;  
            const profit = currentValue - investAmount;            
            const returnRate = (profit / investAmount) * 100;      

            sumInvest += investAmount;
            sumValue += currentValue;

            let isTargetReached = false;
            let badgeHTML = '';
            if(targetRate !== '' && targetRate !== 0 && returnRate >= targetRate) {
                isTargetReached = true;
                badgeHTML = `<span class="badge">🎯 달성</span>`;
            }

            const colorClass = profit > 0 ? 'positive' : (profit < 0 ? 'negative' : '');
            const rowClass = isTargetReached ? 'highlight-row' : ''; 
            
            const row = `
                <tr class="${rowClass}">
                    <td style="text-align: left;">${item.name} <span style="font-size:11px; color:#888;">(${item.symbol})</span> ${badgeHTML}</td>
                    <td>${item.date}</td>
                    <td>${item.shares.toLocaleString()} 주</td>
                    <td>₩${item.purchasePrice.toLocaleString()}</td>
                    <td>₩${item.currentPrice.toLocaleString()}</td>
                    <td>₩${investAmount.toLocaleString()}</td>
                    <td class="${colorClass}">₩${profit.toLocaleString()}</td>
                    <td class="${colorClass}">${returnRate.toFixed(2)}%</td>
                    <td>
                        <button class="btn-small btn-edit" onclick="editInvestment(${index})">수정</button>
                        <button class="btn-small btn-delete" onclick="deleteInvestment(${index})">삭제</button>
                    </td>
                </tr>
            `;
            tableBody.insertAdjacentHTML('beforeend', row);
        });

        const totalProfit = sumValue - sumInvest;
        let totalReturnRate = 0;
        if (sumInvest > 0) totalReturnRate = (totalProfit / sumInvest) * 100;

        const totalColorClass = totalProfit > 0 ? 'positive' : (totalProfit < 0 ? 'negative' : '');

        document.getElementById('totalInvest').innerText = `₩${sumInvest.toLocaleString()}`;
        document.getElementById('totalValue').innerText = `₩${sumValue.toLocaleString()}`;
        
        const profitEl = document.getElementById('totalProfit');
        profitEl.innerText = `₩${totalProfit.toLocaleString()}`;
        profitEl.className = totalColorClass;

        const returnEl = document.getElementById('totalReturn');
        returnEl.innerText = totalReturnRate.toFixed(2) + '%';
        returnEl.className = totalColorClass;

        drawChart();
    }

    updateUI();
</script>

</body>
</html>
