<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주식 포트폴리오 관리</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f9f9f9; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        label { font-weight: bold; margin-top: 10px; display: block; color: #555; }
        input, button { width: 100%; padding: 10px; margin-top: 5px; box-sizing: border-box; border-radius: 4px; border: 1px solid #ccc; }
        button { background-color: #4CAF50; color: white; border: none; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        button:hover { background-color: #45a049; }
        .result { margin-top: 20px; padding: 20px; background-color: #e8f5e9; border-radius: 8px; display: none; }
        .result p { font-size: 16px; margin: 8px 0; }
        .highlight { font-weight: bold; color: #2e7d32; }
    </style>
</head>
<body>
    <div class="container">
        <h2>📈 주식 종목 등록</h2>
        <form id="stockForm">
            <label for="ticker">종목명 (예: NASDAQ:AAPL):</label>
            <input type="text" id="ticker" required placeholder="거래소:종목코드">

            <label for="date">매수 일자:</label>
            <input type="date" id="date" required>

            <label for="qty">매수량:</label>
            <input type="number" id="qty" step="0.01" required placeholder="예: 10">

            <label for="price">매수 단가 ($ 또는 ₩):</label>
            <input type="number" id="price" step="0.01" required placeholder="예: 150.50">

            <button type="submit" id="submitBtn">등록 및 조회하기</button>
        </form>

        <div id="resultBox" class="result">
            <h3>📊 조회 및 계산 결과</h3>
            <p>총 투자 금액: <span class="highlight" id="resInvested"></span></p>
            <p>현재 주가 (Google Finance): <span class="highlight" id="resPrice"></span></p>
            <p>투자 대비 수익률: <span class="highlight" id="resPct"></span>%</p>
            <p>투자 대비 수익금액: <span class="highlight" id="resAmt"></span></p>
        </div>
    </div>

    <script>
        // ★ 여기에 복사해 둔 Google Apps Script 웹 앱 URL을 붙여넣으세요! ★
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyIdJL9c6ayw0LlNpwG_4LV29Mb1EWANAwEs4swkUGEfu8yfy07kWVPlmow57RCxY2lcg/exec";

        document.getElementById('stockForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            btn.innerText = "처리 중... 잠시만 기다려주세요.";
            btn.disabled = true;

            const requestData = {
                ticker: document.getElementById('ticker').value,
                date: document.getElementById('date').value,
                qty: document.getElementById('qty').value,
                price: document.getElementById('price').value
            };

            try {
                // Apps Script로 데이터를 전송합니다. (보안 정책 상 text/plain 설정 사용)
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8',
                    },
                    body: JSON.stringify(requestData)
                });
                
                const result = await response.json();

                if(result.status === 'success') {
                    // 결과를 화면에 표시합니다.
                    document.getElementById('resultBox').style.display = 'block';
                    document.getElementById('resInvested').innerText = result.totalInvested.toLocaleString(undefined, {minimumFractionDigits: 2});
                    document.getElementById('resPrice').innerText = result.currentPrice.toLocaleString(undefined, {minimumFractionDigits: 2});
                    document.getElementById('resPct').innerText = (result.returnPct * 100).toFixed(2);
                    document.getElementById('resAmt').innerText = result.returnAmt.toLocaleString(undefined, {minimumFractionDigits: 2});
                    
                    // 입력 폼 초기화
                    document.getElementById('stockForm').reset();
                } else {
                    alert("오류가 발생했습니다: " + result.message);
                }
            } catch(err) {
                console.error(err);
                alert("서버 통신 실패. 웹 앱 URL이 정확한지, 배포 권한이 '모든 사용자'인지 확인하세요.");
            } finally {
                btn.innerText = "등록 및 조회하기";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
