<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주식 포트폴리오 관리</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f9f9f9; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        label { font-weight: bold; margin-top: 15px; display: block; color: #555; font-size: 14px; }
        input, button { width: 100%; padding: 10px; margin-top: 5px; box-sizing: border-box; border-radius: 4px; border: 1px solid #ccc; }
        
        .submit-btn { background-color: #4CAF50; color: white; border: none; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 25px; padding: 12px; }
        .submit-btn:hover { background-color: #45a049; }
        .result { margin-top: 20px; padding: 20px; background-color: #e8f5e9; border-radius: 8px; display: none; }
        .result p { font-size: 16px; margin: 8px 0; }
        .highlight { font-weight: bold; color: #2e7d32; }
        .stock-name { font-size: 18px; color: #1565c0; font-weight: bold; text-align: center; margin-bottom: 15px; border-bottom: 2px solid #bbdefb; padding-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>📈 주식 종목 등록</h2>
        
        <form id="stockForm">
            <label for="ticker">종목코드 (한국 주식은 6자리 숫자만 입력)</label>
            <input type="text" id="ticker" required placeholder="예: 005930 또는 NASDAQ:AAPL">

            <label for="date">매수 일자:</label>
            <input type="date" id="date" required>

            <label for="qty">매수량:</label>
            <input type="number" id="qty" step="0.01" required placeholder="예: 10">

            <label for="price">매수 단가:</label>
            <input type="number" id="price" step="0.01" required placeholder="예: 75000">

            <button type="submit" class="submit-btn" id="submitBtn">포트폴리오에 등록하기</button>
        </form>

        <div id="resultBox" class="result">
            <div class="stock-name" id="resName">종목명 표시</div>
            <p>총 투자 금액: <span class="highlight" id="resInvested"></span></p>
            <p>현재 주가: <span class="highlight" id="resPrice"></span></p>
            <p>투자 대비 수익률: <span class="highlight" id="resPct"></span>%</p>
            <p>투자 대비 수익금액: <span class="highlight" id="resAmt"></span></p>
        </div>
    </div>

    <script>
        // ★ 여기에 배포된 웹 앱 URL을 붙여넣으세요! ★
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzoXJWmFOMvOG1LmAep_kwoR4OU2JrQpGlN6pkVn7JndYBZGxRE_2627oA9Ofibm7WDmg/exec";

        document.getElementById('stockForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            btn.innerText = "처리 중... 잠시만 기다려주세요.";
            btn.disabled = true;

            // 1. 사용자가 입력한 종목코드 가져오기
            const rawTicker = document.getElementById('ticker').value.trim();
            let finalTicker = rawTicker;

            // 2. 입력값이 정확히 6자리 숫자라면 자동으로 KRX: 를 붙여줌 (정규표현식 사용)
            if (/^\d{6}$/.test(rawTicker)) {
                finalTicker = "KRX:" + rawTicker;
            }

            const requestData = {
                ticker: finalTicker, // 변환된 티커를 서버로 전송
                date: document.getElementById('date').value,
                qty: document.getElementById('qty').value,
                price: document.getElementById('price').value
            };

            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(requestData)
                });
                
                const result = await response.json();

                if(result.status === 'success') {
                    document.getElementById('resultBox').style.display = 'block';
                    // 받아온 종목명을 화면에 표시합니다.
                    document.getElementById('resName').innerText = result.stockName;
                    document.getElementById('resInvested').innerText = result.totalInvested.toLocaleString(undefined, {minimumFractionDigits: 2});
                    document.getElementById('resPrice').innerText = result.currentPrice.toLocaleString(undefined, {minimumFractionDigits: 2});
                    document.getElementById('resPct').innerText = (result.returnPct * 100).toFixed(2);
                    document.getElementById('resAmt').innerText = result.returnAmt.toLocaleString(undefined, {minimumFractionDigits: 2});
                    
                    document.getElementById('stockForm').reset();
                } else {
                    alert("오류가 발생했습니다: " + result.message);
                }
            } catch(err) {
                console.error(err);
                alert("서버 통신에 실패했습니다.");
            } finally {
                btn.innerText = "포트폴리오에 등록하기";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
