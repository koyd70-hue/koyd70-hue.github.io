<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 주식 포트폴리오 (실시간 연동)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f6; color: #333; padding: 15px; margin: 0; transition: background-color 0.3s, color 0.3s; }
        .container { max-width: 1000px; margin: 0 auto; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { color: #2c3e50; margin: 0; font-size: 24px; transition: color 0.3s; }
        .btn-theme-toggle { background: #2c3e50; color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 14px; font-weight: bold; transition: 0.3s; }
        .btn-theme-toggle:hover { background: #1a252f; }

        .tab-menu { display: flex; border-bottom: 2px solid #ccc; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; cursor: pointer; background: #e9ecef; border: none; font-size: 15px; font-weight: bold; color: #7f8c8d; transition: 0.3s; border-radius: 8px 8px 0 0; margin-right: 5px; }
        .tab-btn:last-child { margin-right: 0; }
        .tab-btn:hover { background: #dcdde1; }
        .tab-btn.active { background: #3498db; color: white; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .card { background: #fff; padding: 20px; border-radius: 0 0 8px 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: background-color 0.3s; }
        h2 { color: #2c3e50; margin-top: 0; font-size: 20px; transition: color 0.3s; display: flex; justify-content: space-between; align-items: center; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; transition: color 0.3s; }
        input, select { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; transition: 0.3s; }
        input[readonly] { background-color: #e9ecef; }
        
        /* 버튼 스타일들 */
        .btn-main { background-color: #3498db; color: white; border: none; padding: 12px 15px; border-radius: 4px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold;}
        .btn-main:hover { background-color: #2980b9; }
        .btn-refresh { background-color: #2ecc71; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .btn-refresh:hover { background-color: #27ae60; }
        
        .dashboard { display: flex; gap: 15px; margin-bottom: 20px; }
        .dash-box { flex: 1; background: #ecf0f1; padding: 15px; border-radius: 8px; text-align: center; transition: background-color 0.3s; }
        .dash-box h3 { margin-top: 0; font-size: 13px; color: #7f8c8d; }
        .dash-box p { font-size: 18px; font-weight: bold; margin: 0; }
        
        .target-setting { background-color: #e8f4f8; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; transition: background-color 0.3s; }
        .target-setting label { margin: 0; color: #2980b9; }
        .target-setting input { width: 100px; padding: 8px; }

        .positive { color: #e74c3c; }
        .negative { color: #2980b9; }
        .loading-text { color: #f39c12; font-weight: bold; font-size: 14px; margin-left: 10px; display: none; }

        .chart-container { width: 100%; max-width: 400px; margin: 0 auto 30px; }

        .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; min-width: 800px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: right; white-space: nowrap; transition: 0.3s; }
        th { background-color: #f8f9fa; text-align: center; cursor: pointer; }
        th:hover { background-color: #e2e6ea; } 
        td:first-child { text-align: center; }
        
        .highlight-row { background-color: #fff3cd !important; font-weight: bold; }
        .badge { background-color: #e74c3c; color: white; padding: 2px 6px; border-radius: 4px; font-size: 12px; margin-left: 5px; }

        .btn-small { padding: 6px 10px; border: none; border-radius: 3px; cursor: pointer; margin: 0 2px; color: white; font-size: 12px; }
        .btn-edit { background-color: #f39c12; }
        .btn-delete { background-color: #e74c3c; }

        /* 다크 모드 스타일 */
        body.dark-mode { background-color: #121212; color: #e0e0e0; }
        body.dark-mode h1, body.dark-mode h2, body.dark-mode label { color: #e0e0e0; }
        body.dark-mode .card { background-color: #1e1e1e; box-shadow: 0 4px 6px rgba(0,0,0,0.5); }
        body.dark-mode .tab-btn { background: #2d2d2d; color: #aaa; border-bottom-color: #444; }
        body.dark-mode .tab-btn:hover { background: #3d3d3d; }
        body.dark-mode .tab-btn.active { background: #bb86fc; color: #121212; }
        body.dark-mode .btn-main { background-color: #bb86fc; color: #121212; }
        body.dark-mode .btn-main:hover { background-color: #9965f4; }
        body.dark-mode input, body.dark-mode select { background-color: #2d2d2d; color: #e0e0e0; border-color: #444; }
        body.dark-mode input[readonly] { background-color: #1e1e1e; color: #888; }
        body.dark-mode .dash-box { background-color: #2d2d2d; }
        body.dark-mode .target-setting { background-color: #2d2d2d; }
        body.dark-mode .target-setting label { color: #bb86fc; }
        body.dark-mode th, body.dark-mode td { border-color: #444; }
        body.dark-mode th { background-color: #2d2d2d; color: #e0e0e0; }
        body.dark-mode th:hover { background-color: #3d3d3d; }
        body.dark-mode .positive { color: #ff6b6b; } 
        body.dark-mode .negative { color: #4dabf7; } 
        body.dark-mode .highlight-row { background-color: #3a3a1c !important; color: #fff; } 
        body.dark-mode .btn-theme-toggle { background: #f1c40f; color: #333; }
        body.dark-mode .btn-theme-toggle:hover { background: #d4ac0d; }

        @media screen and (max-width: 768px) {
            .header-top { flex-direction: column; gap: 10px; }
            .dashboard { flex-wrap: wrap; }
            .dash-box { flex: 1 1 45%; } 
            .target-setting { flex-direction: column; align-items: flex-start; gap: 10px; }
            .target-setting input { width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-top">
        <h1>📈 나의 주식 포트폴리오</h1>
        <button id="themeToggleBtn" class="btn-theme-toggle" onclick="toggleTheme()">🌙 다크 모드</button>
    </div>

    <div class="tab-menu">
        <button class="tab-btn active" id="btn-input" onclick="switchTab('tab-input', 'btn-input')">✍️ 투자 내역 입력</button>
        <button class="tab-btn" id="btn-view" onclick="switchTab('tab-view', 'btn-view')">📊 투자 내역 조회</button>
    </div>

    <div id="tab-input" class="tab-content active">
        <div class="card">
            <h2>종목 정보 입력</h2>
            <div class="form-group">
                <label for="stockSelect">종목명 조회 및 선택 (Yahoo Finance 지원 종목)</label>
                <input list="stockList" id="stockSelect" placeholder="종목명을 선택하세요">
                <datalist id="stockList">
                    <option value="삼성전자"></option>
                    <option value="SK하이닉스"></option>
                    <option value="현대차"></option>
                    <option value="네이버"></option>
                    <option value="카카오"></option>
                </datalist>
            </div>
            <div class="form-group">
                <label for="purchaseDate">매입일자</label>
                <input type="date" id="purchaseDate">
            </div>
            <div class="form-group">
                <label for="shares">매입 주식수 (주)</label>
                <input type="number" id="shares" placeholder="예: 10" min="1">
            </div>
            <div class="form-group">
                <label for="purchasePrice">매입단가 (원)</label>
                <input type="number" id="purchasePrice" placeholder="예: 75000" min="0">
            </div>
            <div class="form-group">
                <label for="investAmount">총 투자금액 (원)</label>
                <input type="text" id="investAmount" readonly placeholder="수량과 단가를 입력하면 계산됩니다">
            </div>
            <button class="btn-main" onclick="addInvestment()">투자 내역 저장하기</button>
        </div>
    </div>

    <div id="tab-view" class="tab-content">
        <div class="card">
            <h2>
                나의 포트폴리오 현황
                <div>
                    <span id="loadingMsg" class="loading-text">⏳ 실시간 주가 불러오는 중...</span>
                    <button class="btn-refresh" onclick="fetchLivePrices()">🔄 실시간 주가 갱신</button>
                </div>
            </h2>
            
            <div class="dashboard">
                <div class="dash-box">
                    <h3>총 투자금액</h3>
                    <p id="totalInvest">0 원</p>
                </div>
                <div class="dash-box">
                    <h3>총 평가금액</h3>
                    <p id="totalValue">0 원</p>
                </div>
                <div class="dash-box">
                    <h3>총 수익금액</h3>
                    <p id="totalProfit">0 원</p>
                </div>
                <div class="dash-box">
                    <h3>총 수익률</h3>
                    <p id="totalReturn">0.00%</p>
                </div>
            </div>

            <div class="target-setting">
                <label for="targetRateInput">🎯 알림을 받을 목표 수익률을 설정하세요 (%):</label>
                <input type="number" id="targetRateInput" placeholder="예: 10" oninput="saveTargetRate()" value="10">
            </div>

            <div class="chart-container">
                <canvas id="portfolioChart"></canvas>
            </div>

            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th onclick="sortTable('name')">종목명 ↕️</th>
                            <th onclick="sortTable('date')">매입일자 ↕️</th>
                            <th onclick="sortTable('shares')">보유 주식수 ↕️</th>
                            <th onclick="sortTable('purchasePrice')">매입단가 ↕️</th>
                            <th onclick="sortTable('currentPrice')">현재가(실시간) ↕️</th>
                            <th onclick="sortTable('investAmount')">투자금액 ↕️</th>
                            <th onclick="sortTable('profit')">수익금액 ↕️</th>
                            <th onclick="sortTable('returnRate')">수익률 ↕️</th>
                            <th>관리</th>
                        </tr>
                    </thead>
                    <tbody id="portfolioTableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    // [핵심 변경 1] 하드코딩된 가격 대신, 종목 이름과 Yahoo Ticker를 연결하는 사전(Map)을 만듭니다.
    const tickerMap = {
        "삼성전자": "005930.KS",
        "SK하이닉스": "000660.KS",
        "현대차": "005380.KS",
        "네이버": "035420.KS",
        "카카오": "035720.KQ"
    };

    // 실시간 가격을 저장할 빈 객체
    let currentPrices = {}; 

    let portfolio = JSON.parse(localStorage.getItem('myStockPortfolio')) || [];
    let targetRate = localStorage.getItem('myTargetRate') || 10;
    document.getElementById('targetRateInput').value = targetRate;
    let portfolioChart = null; 

    const themeToggleBtn = document.getElementById('themeToggleBtn');
    if (localStorage.getItem('myAppTheme') === 'dark') {
        document.body.classList.add('dark-mode');
        themeToggleBtn.innerText = '☀️ 라이트 모드';
    }

    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        if (document.body.classList.contains('dark-mode')) {
            localStorage.setItem('myAppTheme', 'dark');
            themeToggleBtn.innerText = '☀️ 라이트 모드';
        } else {
            localStorage.setItem('myAppTheme', 'light');
            themeToggleBtn.innerText = '🌙 다크 모드';
        }
        drawChart(); 
    }

    function switchTab(tabId, btnId) {
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        document.getElementById(btnId).classList.add('active');
    }

    const sharesInput = document.getElementById('shares');
    const priceInput = document.getElementById('purchasePrice');
    const investAmountInput = document.getElementById('investAmount');

    function calculateFormTotal() {
        const shares = Number(sharesInput.value);
        const price = Number(priceInput.value);
        if (shares > 0 && price > 0) {
            investAmountInput.value = (shares * price).toLocaleString() + ' 원';
        } else {
            investAmountInput.value = '';
        }
    }

    sharesInput.addEventListener('input', calculateFormTotal);
    priceInput.addEventListener('input', calculateFormTotal);

    function saveToLocalStorage() {
        localStorage.setItem('myStockPortfolio', JSON.stringify(portfolio));
    }

    function saveTargetRate() {
        targetRate = Number(document.getElementById('targetRateInput').value);
        localStorage.setItem('myTargetRate', targetRate);
        updateUI(); 
    }

    function addInvestment() {
        const stockName = document.getElementById('stockSelect').value;
        const purchaseDate = document.getElementById('purchaseDate').value;
        const shares = Number(sharesInput.value);
        const purchasePrice = Number(priceInput.value);

        if (!stockName || !purchaseDate || shares <= 0 || purchasePrice <= 0) {
            alert('모든 항목을 올바르게 입력해주세요.');
            return;
        }
        // 사용자가 입력한 종목이 tickerMap에 있는지 확인
        if (!tickerMap[stockName]) {
            alert('현재 실시간 조회가 지원되지 않는 종목입니다. 목록에서 선택해주세요.');
            return;
        }

        portfolio.push({
            name: stockName, date: purchaseDate, shares: shares, purchasePrice: purchasePrice
        });
        
        saveToLocalStorage(); 
        
        // 추가한 뒤 UI를 바로 업데이트
        document.getElementById('stockSelect').value = '';
        document.getElementById('purchaseDate').value = '';
        sharesInput.value = '';
        priceInput.value = '';
        investAmountInput.value = '';
        
        switchTab('tab-view', 'btn-view');
        // 새 종목이 추가되었으니 실시간 주가를 다시 불러옵니다.
        fetchLivePrices(); 
    }

    function deleteInvestment(index) {
        if(confirm('정말 삭제하시겠습니까?')) {
            portfolio.splice(index, 1); 
            saveToLocalStorage();       
            updateUI();                 
        }
    }

    function editInvestment(index) {
        const item = portfolio[index];
        document.getElementById('stockSelect').value = item.name;
        document.getElementById('purchaseDate').value = item.date;
        sharesInput.value = item.shares;
        priceInput.value = item.purchasePrice;
        calculateFormTotal();

        portfolio.splice(index, 1);
        saveToLocalStorage();
        updateUI();
        switchTab('tab-input', 'btn-input');
    }

    // =========================================
    // [핵심 변경 2] Yahoo Finance API + CORS Proxy 호출 함수
    // =========================================
    async function fetchLivePrices() {
        const loadingMsg = document.getElementById('loadingMsg');
        loadingMsg.style.display = 'inline'; // 로딩 메시지 표시

        // 포트폴리오에 있는 고유한 종목 이름만 추출
        const uniqueStocks = [...new Set(portfolio.map(item => item.name))];

        // 각 종목별로 API 호출
        for (const stockName of uniqueStocks) {
            const ticker = tickerMap[stockName];
            if (ticker) {
                // Yahoo Finance 차트 API 주소
                const yahooUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}`;
                // 브라우저 차단을 막기 위한 프록시 주소 (allorigins)
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(yahooUrl)}`;

                try {
                    const response = await fetch(proxyUrl);
                    const data = await response.json();
                    
                    // 프록시를 통해 받은 데이터(문자열)를 다시 JSON 객체로 변환
                    const parsedData = JSON.parse(data.contents);
                    
                    // Yahoo API 구조 깊숙한 곳에서 현재가(regularMarketPrice) 추출
                    const price = parsedData.chart.result[0].meta.regularMarketPrice;
                    
                    // 가져온 가격을 currentPrices 객체에 저장
                    currentPrices[stockName] = price;
                } catch (error) {
                    console.error(`${stockName} 가격 가져오기 실패:`, error);
                    // 실패 시 임시로 0원 처리 또는 기존 가격 유지
                    if(!currentPrices[stockName]) currentPrices[stockName] = 0; 
                }
            }
        }

        loadingMsg.style.display = 'none'; // 로딩 메시지 숨김
        updateUI(); // 가격을 다 가져왔으니 화면 다시 그리기
    }

    function drawChart() {
        const ctx = document.getElementById('portfolioChart').getContext('2d');
        const aggregatedData = {};
        portfolio.forEach(item => {
            const investAmount = item.shares * item.purchasePrice;
            if(aggregatedData[item.name]) aggregatedData[item.name] += investAmount;
            else aggregatedData[item.name] = investAmount;
        });

        const labels = Object.keys(aggregatedData);
        const data = Object.values(aggregatedData);

        const isDark = document.body.classList.contains('dark-mode');
        const chartTextColor = isDark ? '#e0e0e0' : '#333';

        if (portfolioChart) portfolioChart.destroy();
        portfolioChart = new Chart(ctx, {
            type: 'pie',
            data: { 
                labels: labels, 
                datasets: [{ 
                    data: data, 
                    backgroundColor: ['#3498db', '#e74c3c', '#f1c40f', '#2ecc71', '#9b59b6', '#34495e'],
                    borderColor: isDark ? '#1e1e1e' : '#fff' 
                }] 
            },
            options: { 
                responsive: true, 
                plugins: { 
                    legend: { position: 'bottom', labels: { color: chartTextColor } }, 
                    title: { display: true, text: '투자 원금 기준 포트폴리오 비중', color: chartTextColor } 
                } 
            }
        });
    }

    let currentSortColumn = '';
    let isAscending = true; 

    function sortTable(column) {
        if (currentSortColumn === column) isAscending = !isAscending;
        else { currentSortColumn = column; isAscending = true; }

        portfolio.sort((a, b) => {
            let valA, valB;
            const currentPriceA = currentPrices[a.name] || 0;
            const currentPriceB = currentPrices[b.name] || 0;

            const investA = a.shares * a.purchasePrice;
            const profitA = (a.shares * currentPriceA) - investA;
            const returnA = investA > 0 ? (profitA / investA) * 100 : 0;
            
            const investB = b.shares * b.purchasePrice;
            const profitB = (b.shares * currentPriceB) - investB;
            const returnB = investB > 0 ? (profitB / investB) * 100 : 0;

            if (column === 'name') { valA = a.name; valB = b.name; }
            else if (column === 'date') { valA = a.date; valB = b.date; }
            else if (column === 'investAmount') { valA = investA; valB = investB; }
            else if (column === 'profit') { valA = profitA; valB = profitB; }
            else if (column === 'returnRate') { valA = returnA; valB = returnB; }
            else if (column === 'currentPrice') { valA = currentPriceA; valB = currentPriceB; }
            else { valA = a[column]; valB = b[column]; } 

            if (valA < valB) return isAscending ? -1 : 1;
            if (valA > valB) return isAscending ? 1 : -1;
            return 0;
        });
        updateUI(); 
    }

    function updateUI() {
        const tableBody = document.getElementById('portfolioTableBody');
        tableBody.innerHTML = ''; 

        let sumInvest = 0; 
        let sumValue = 0;  

        portfolio.forEach((item, index) => {
            // 이제 item.currentPrice 대신 실시간으로 받아온 currentPrices 객체에서 값을 꺼냅니다.
            const livePrice = currentPrices[item.name] || 0; 

            const investAmount = item.shares * item.purchasePrice; 
            const currentValue = item.shares * livePrice;  
            const profit = currentValue - investAmount;            
            const returnRate = investAmount > 0 ? (profit / investAmount) * 100 : 0;      

            sumInvest += investAmount;
            sumValue += currentValue;

            let isTargetReached = false;
            let badgeHTML = '';
            // livePrice가 0보다 클 때(데이터를 정상적으로 받아왔을 때)만 목표 도달 계산
            if(livePrice > 0 && targetRate !== '' && targetRate !== 0 && returnRate >= targetRate) {
                isTargetReached = true;
                badgeHTML = `<span class="badge">🎯 달성</span>`;
            }

            const colorClass = profit > 0 ? 'positive' : (profit < 0 ? 'negative' : '');
            const rowClass = isTargetReached ? 'highlight-row' : ''; 
            
            // 가격을 못 불러온 경우(로딩중이거나 실패) '불러오는 중...' 표시
            const displayPrice = livePrice > 0 ? livePrice.toLocaleString() + ' 원' : '불러오는 중...';

            const row = `
                <tr class="${rowClass}">
                    <td>${item.name} ${badgeHTML}</td>
                    <td>${item.date}</td>
                    <td>${item.shares.toLocaleString()} 주</td>
                    <td>${item.purchasePrice.toLocaleString()} 원</td>
                    <td><b>${displayPrice}</b></td>
                    <td>${investAmount.toLocaleString()} 원</td>
                    <td class="${colorClass}">${livePrice > 0 ? profit.toLocaleString() + ' 원' : '-'}</td>
                    <td class="${colorClass}">${livePrice > 0 ? returnRate.toFixed(2) + '%' : '-'}</td>
                    <td>
                        <button class="btn-small btn-edit" onclick="editInvestment(${index})">수정</button>
                        <button class="btn-small btn-delete" onclick="deleteInvestment(${index})">삭제</button>
                    </td>
                </tr>
            `;
            tableBody.insertAdjacentHTML('beforeend', row);
        });

        const totalProfit = sumValue - sumInvest;
        let totalReturnRate = 0;
        if (sumInvest > 0) {
            totalReturnRate = (totalProfit / sumInvest) * 100;
        }

        const totalColorClass = totalProfit > 0 ? 'positive' : (totalProfit < 0 ? 'negative' : '');

        document.getElementById('totalInvest').innerText = sumInvest.toLocaleString() + ' 원';
        document.getElementById('totalValue').innerText = sumValue.toLocaleString() + ' 원';
        
        const profitEl = document.getElementById('totalProfit');
        profitEl.innerText = totalProfit.toLocaleString() + ' 원';
        profitEl.className = totalColorClass;

        const returnEl = document.getElementById('totalReturn');
        returnEl.innerText = totalReturnRate.toFixed(2) + '%';
        returnEl.className = totalColorClass;

        drawChart();
    }

    // 페이지가 처음 열릴 때 실시간 가격을 즉시 가져옵니다.
    fetchLivePrices();
</script>

</body>
</html>
